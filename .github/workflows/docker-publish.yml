name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # This adds a "Run workflow" button to GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # Change 'vars' to 'secrets' if you saved your username as a Secret
          username: ${{ secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


            - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # This line checks both Secrets and Variables for your username
          tags: ${{ secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}/devps-lab:latest

